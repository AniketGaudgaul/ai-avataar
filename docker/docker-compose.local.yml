# Local dev services (spec 10, Phase A): Qdrant vector store + Neo4j graph.
# Bring up with:  docker compose -f docker/docker-compose.local.yml up -d
# The API itself is run locally with uvicorn during development.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      # Matches NEO4J_PASSWORD in .env — change both together.
      NEO4J_AUTH: neo4j/please_change_me
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
